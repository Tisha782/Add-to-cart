<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS system</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 class="mainheading">Retail Billing System</h1>
    <div class="container">
        <div class="card carttable">
            <h2>Add to cart </h2>
            <div class="product-group">
                <div>
                <label for="product-filter">Product ID:</label>
                    <input type="text" id="product-filter" name="product-filter" placeholder="Enter product id...." required/> 
                </div>
                <div>
                <label for="product-price">Product Price:</label>
                    <input type="number" id="product-price" name="product-price" />
                </div>
                <div>
                <label for="product-qty">Product Quantity:</label>
                    <input type="number" id="product-qty" name="product-qty" min="1" value ="1" />

            </div>
            <div> <button type="button" id="add-to-cart">Add to Cart</button></div>
        </div>
        <div class="card">
            <h2>Cart items</h2>
            <table id="cartTable">
                <thead>
                    <tr>
                        <th>Products</th>
                        <th>Price</th>
                        <th>Quantity</th>
                        <th>Total</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="cart-items-body">
                </tbody>
            </table>
                <h2>Bill Summary</h2>
                <div class="bill-summary">
                    <div class="total-items">Total Items: <span id="totalitems">0</span></div>
                    <div class="sub-total">Sub Total: <span id="subtotal">0.00</span></div>
                    <div class="gst">GST (18%): <span id="gstax">0.00</span></div>
                    <div class="grand-total">Grand Total: <span id="grandtotal">0.00</span></div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>   
</body>
</html>
